<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fork: {{TITLE}}</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { color-scheme: dark; }
  body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; background: #0b1220; color: #e5e7eb; line-height: 1.5; }
  h1 { margin-bottom: 0.25rem; font-size: 1.6rem; }
  .slug { color: #94a3b8; font-family: monospace; font-size: 0.9rem; }
  .problem { background: #111827; border-left: 3px solid #60a5fa; padding: 0.75rem 1rem; margin: 1.5rem 0; }
  .actions { margin: 1.5rem 0; }
  .actions a { display: inline-block; background: #2563eb; color: white; padding: 0.6rem 1rem; border-radius: 6px; text-decoration: none; margin-right: 0.5rem; }
  .actions a:hover { background: #1d4ed8; }
  .screenshot { width: 100%; height: auto; border: 1px solid #1f2937; border-radius: 6px; }
  .meta { color: #9ca3af; font-size: 0.85rem; margin-top: 2rem; }
  .fixture { font-size: 0.9rem; }
  a { color: #93c5fd; }
</style>
</head>
<body>
<h1>{{TITLE}}</h1>
<p class="slug">{{SLUG}} · {{NODE_COUNT}} nodes</p>

<div class="problem"><strong>What it does.</strong> {{PROBLEM}}</div>

<div class="actions">
  <a href="{{JSON_HREF}}" download>Download workflow .json</a>
  <a href="{{JSON_HREF}}">View raw</a>
</div>

<img class="screenshot" src="{{SCREENSHOT_HREF}}" alt="{{TITLE}} preview">

{{FIXTURE_BLOCK}}

<p class="meta">Import the .json into your n8n instance (Workflows → Import from File), then configure credentials per the integrations referenced in the nodes.</p>
</body>
</html>
