# Workflow Governance Configuration
# ==================================
#
# DEPLOYMENT PHASES (SIMPLIFIED - DEV-ONLY POLICY):
#   DEV      - All active development, freely modifiable
#   ARCHIVED - Deprecated/superseded, read-only
#
# NOTE: ALPHA/BETA/GA/PROD phases are NOT USED in this organization.
#       All active workflows must be DEV. When deprecated, move to ARCHIVED.
#
# RULES:
#   - Deletion is BLOCKED (archive instead)
#   - Only DEV phase workflows exist for active work
#   - ARCHIVED for deprecated/superseded workflows
#   - New workflows auto-tagged as DEV
#   - Superseded workflows must be archived immediately
#
# TAG IDs (n8n native tags):
#   DEV:      Nbnc0KJVYlJeasQJ
#   ARCHIVED: 4k9QbQQTpxNkOoJQ

