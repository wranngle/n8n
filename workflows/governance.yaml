# Workflow library governance.
#
# Live n8n tenants may use stricter phase tags and activation controls. This
# public registry uses a library lifecycle so readers can tell which examples
# are import-ready without exposing private runtime metadata.

version: "3.0"
last_updated: "2026-05-10"

settings:
  deletion_allowed_for_live_workflows: false
  public_default_state: draft
  allowed_states:
    - draft
    - published
    - retired
  duplicate_similarity_threshold: 70

rules:
  conversion_required:
    description: "Workflow exports must pass through the conversion boundary before entering the library."
    enforced_by:
      - "scripts/convert-workflow.js"
      - "scripts/verify-workflows.js"

  no_runtime_fields:
    description: "Reusable workflow JSON must not contain credentials, pinData, webhookId, staticData, or meta.instanceId."
    enforced_by:
      - "scripts/verify-workflows.js"

  no_hardcoded_secrets:
    description: "Secrets belong in n8n credentials or environment variables."
    enforced_by:
      - "manual review"
      - "gitleaks"

  no_direct_llm_http:
    description: "Use n8n LangChain nodes instead of HTTP Request or Code nodes for LLM APIs."
    enforced_by:
      - "manual review"

  prefer_switch_routing:
    description: "Use Switch nodes for new conditional routing workflows."
    enforced_by:
      - "manual review"

  archive_live_workflows:
    description: "Do not delete live workflows to retire them; deactivate and mark retired or archived in the live tenant."
    enforced_by:
      - "manual review"

lifecycle:
  draft:
    modifiable: true
    import_ready: false
    required_verification:
      - local_json_parse

  published:
    modifiable: true
    import_ready: true
    required_verification:
      - local_json_parse
      - public_export_check
      - import_notes

  retired:
    modifiable: false
    import_ready: false
    required_verification:
      - local_json_parse

