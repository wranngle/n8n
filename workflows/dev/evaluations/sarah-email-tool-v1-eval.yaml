# Evaluation Configuration: Sarah Email Tool v1.0
# Workflow ID: Rry9i9JdDulTrCci
# Complexity: Medium (10 nodes)
# Protocol: Hierarchical Development - Spec → Tests → Implementation
# Target: 1900+ test scenarios via combinatorial expansion

workflow_id: "Rry9i9JdDulTrCci"
workflow_name: "[DEV] Sarah Email Tool v1.0"
webhook_path: "sarah-send-email"

# Workflow Architecture:
# Webhook → Auth Check → Extract Params → Validate Email → Compose Email
# → Send via SMTP → Route Response (Success/Error)

evaluation:
  pass_threshold: 95
  max_retries: 2
  timeout_ms: 30000
  combinatorial_expansion: true  # Generate test combinations

# ============================================
# PARAMETRIC TEST DEFINITIONS
# These expand into 1900+ test cases
# ============================================

parametric_tests:

  # ==========================================
  # AUTHENTICATION MATRIX (4 methods × 3 states = 12 base × variations)
  # ==========================================
  authentication:
    methods:
      - name: "secret_header"
        header: "X-Webhook-Secret"
        valid_values: ["wranngle-email-2024"]
        invalid_values: ["wrong-secret", "wranngle-email-2023", "WRANNGLE-EMAIL-2024", "", "null", "undefined", "wranngle-sms-2024"]
      - name: "elevenlabs_user_agent"
        header: "User-Agent"
        valid_values: ["ElevenLabs/1.0", "ElevenLabs/2.0", "ElevenLabs-Agent/1.0", "Mozilla/5.0 ElevenLabs"]
        invalid_values: ["Mozilla/5.0", "curl/7.68.0", "PostmanRuntime/7.28.4"]
      - name: "localhost_origin"
        header: "Host"
        valid_values: ["localhost", "localhost:5678", "127.0.0.1"]
        invalid_values: ["example.com", "n8n.wranngle.com", "api.elevenlabs.io"]
    expected_outcomes:
      valid_auth: {status: [200, 202, 500], not_contains: ["UNAUTHORIZED"]}
      invalid_auth: {status: 401, contains: ["UNAUTHORIZED"]}

  # ==========================================
  # EMAIL VALIDATION MATRIX (500+ combinations)
  # ==========================================
  email_validation:
    valid_patterns:
      # Standard formats
      - "user@example.com"
      - "user@example.org"
      - "user@example.net"
      - "user@example.io"
      - "user@example.co"
      - "user@example.co.uk"
      - "user@subdomain.example.com"
      - "user@mail.subdomain.example.com"
      # Plus addressing
      - "user+tag@example.com"
      - "user+sales@example.com"
      - "user+demo@example.com"
      - "user+wranngle@example.com"
      # Dots in local part
      - "first.last@example.com"
      - "first.middle.last@example.com"
      - "a.b.c.d@example.com"
      # Numbers
      - "user123@example.com"
      - "123user@example.com"
      - "user123user@example.com"
      - "12345@example.com"
      # Hyphens in domain
      - "user@my-company.com"
      - "user@my-great-company.com"
      - "user@a-b-c.com"
      # Mixed case (should be normalized)
      - "User@Example.com"
      - "USER@EXAMPLE.COM"
      - "uSeR@eXaMpLe.CoM"
      # Long local parts
      - "averylongemailaddresspart@example.com"
      - "this.is.a.very.long.email.address@example.com"
      # Short
      - "a@b.co"
      - "x@y.io"
      # Real TLDs
      - "user@company.tech"
      - "user@startup.ai"
      - "user@business.solutions"
      - "user@company.services"
      # Country codes
      - "user@company.de"
      - "user@company.fr"
      - "user@company.jp"
      - "user@company.cn"
      - "user@company.au"
      - "user@company.ca"
      - "user@company.mx"
      - "user@company.br"

    invalid_patterns:
      # Missing @
      - "userexample.com"
      - "user.example.com"
      - "user[at]example.com"
      # Missing domain
      - "user@"
      - "user@."
      - "user@.com"
      # Missing local part
      - "@example.com"
      - "@"
      # Missing TLD
      - "user@example"
      - "user@example."
      # Double @
      - "user@@example.com"
      - "user@user@example.com"
      # Spaces
      - "user @example.com"
      - "user@ example.com"
      - "user @ example.com"
      - " user@example.com"
      - "user@example.com "
      - "user name@example.com"
      # Special characters (invalid)
      - "user<>@example.com"
      - "user()@example.com"
      - "user[]@example.com"
      - "user\\@example.com"
      - "user,name@example.com"
      - "user;name@example.com"
      - "user:name@example.com"
      - 'user"name@example.com'
      # Empty
      - ""
      - " "
      - "   "
      # Null-ish
      - "null"
      - "undefined"
      - "none"
      - "nil"
      - "NULL"
      # Invalid TLDs
      - "user@example.c"
      - "user@example.123"
      - "user@example.-com"
      - "user@example.com-"
      # IP addresses (may or may not be valid depending on config)
      - "user@192.168.1.1"
      - "user@[192.168.1.1]"
      # Unicode (edge case)
      - "用户@example.com"
      - "user@例え.jp"
      # Too long
      - "a]@example.com".replace("]", "a" * 300)
      # Injection attempts
      - "user@example.com; DROP TABLE users;"
      - "user@example.com<script>alert(1)</script>"
      - "user@example.com\n\rBcc: attacker@evil.com"

  # ==========================================
  # TEMPLATE MATRIX (3 templates × many variations)
  # ==========================================
  templates:
    types:
      - name: "demo"
        expected_subject_contains: "Demo"
        expected_body_contains: ["(888) 266-2193", "Wranngle", "demo"]
      - name: "recap"
        expected_subject_contains: "Recap"
        expected_body_contains: ["thanks", "chatting", "Wranngle"]
      - name: "followup"
        expected_subject_contains: "Following Up"
        expected_body_contains: ["following up", "demo", "Wranngle"]

    invalid_templates:
      - "invalid"
      - "unknown"
      - "test"
      - ""
      - "null"
      - "undefined"
      - "DEMO"
      - "Demo"
      - "RECAP"
      - "FOLLOWUP"
      - "<script>alert(1)</script>"
      - "'; DROP TABLE templates;--"

  # ==========================================
  # NAME VARIATIONS (personalization)
  # ==========================================
  names:
    valid:
      - "John"
      - "Jane"
      - "Bob"
      - "Alice"
      - "Dr. Smith"
      - "Mr. Johnson"
      - "Mary-Jane"
      - "O'Connor"
      - "José"
      - "François"
      - "Müller"
      - "김철수"
      - "山田太郎"
      - "محمد"
      - "Владимир"
      - "A"
      - "AB"
      - "A Very Long Name That Goes On And On"

    empty_or_missing:
      - ""
      - " "
      - null
      - undefined

    expected_default: "there"

  # ==========================================
  # INDUSTRY VARIATIONS
  # ==========================================
  industries:
    valid:
      - "hvac"
      - "plumbing"
      - "electrical"
      - "property_management"
      - "legal"
      - "roofing"
      - "landscaping"
      - "pest_control"
      - "appliance_repair"
      - "locksmith"
      - "garage_door"
      - "pool_service"
      - "cleaning"
      - "moving"
      - "storage"

    fallback:
      - ""
      - null
      - "other"
      - "unknown"

    expected_fallback: "service business"

  # ==========================================
  # COMPANY NAME VARIATIONS
  # ==========================================
  company_names:
    valid:
      - "Acme HVAC"
      - "Smith Plumbing"
      - "Johnson & Sons"
      - "ABC Services LLC"
      - "The Repair Company"
      - "24/7 Emergency Services"
      - "Best-In-Class Contractors"
      - "A+ Rated Services"
      - "123 Plumbing"
      - "O'Brien's Heating"
      - "Müller & Associates"
      - "서울 서비스"
      - "東京サービス"

    empty:
      - ""
      - " "
      - null

# ============================================
# EXPLICIT TEST CASES (Core scenarios)
# ============================================
test_cases:

  # ==========================================
  # AUTHENTICATION SUITE (P0 - Security)
  # ==========================================

  # Valid Authentication
  - id: AUTH001
    name: "Valid Secret Header - Exact Match"
    priority: P0
    category: authentication
    input:
      headers:
        X-Webhook-Secret: "wranngle-email-2024"
        Content-Type: "application/json"
      body:
        email: "test@example.com"
        first_name: "Test"
    expected:
      status: [200, 202, 500]
    assertions:
      - type: status_code_not
        value: 401
    weight: 20

  - id: AUTH002
    name: "ElevenLabs User-Agent Bypass"
    priority: P0
    category: authentication
    input:
      headers:
        User-Agent: "ElevenLabs/1.0"
        Content-Type: "application/json"
      body:
        email: "test@example.com"
        first_name: "Test"
    expected:
      status: [200, 202, 500]
    assertions:
      - type: status_code_not
        value: 401
    weight: 15

  - id: AUTH003
    name: "Localhost Host Bypass"
    priority: P0
    category: authentication
    input:
      headers:
        Host: "localhost"
        Content-Type: "application/json"
      body:
        email: "test@example.com"
        first_name: "Test"
    expected:
      status: [200, 202, 500]
    assertions:
      - type: status_code_not
        value: 401
    weight: 10

  # Invalid Authentication
  - id: AUTH004
    name: "Missing All Auth"
    priority: P0
    category: authentication
    input:
      headers:
        Content-Type: "application/json"
      body:
        email: "test@example.com"
        first_name: "Test"
    expected:
      status: 401
      response_contains: ["UNAUTHORIZED"]
    assertions:
      - type: json_path
        path: "$.success"
        value: false
    weight: 20

  - id: AUTH005
    name: "Wrong Secret - Similar"
    priority: P0
    category: authentication
    input:
      headers:
        X-Webhook-Secret: "wranngle-email-2023"
        Content-Type: "application/json"
      body:
        email: "test@example.com"
        first_name: "Test"
    expected:
      status: 401
    weight: 10

  - id: AUTH006
    name: "Wrong Secret - Case Sensitive"
