# ============================================
# COMBINATORIAL EXPANSION RULES
# ============================================
expansion_rules:
  # Generate all combinations of:
  # - 4 auth methods × 8 auth values = 32 auth tests
  # - 50 valid emails × 3 templates = 150 template tests
  # - 50 invalid emails = 50 validation tests
  # - 17 names × 15 industries × 13 companies = 3,315 data tests
  # - Security variations = 50+ tests
  #
  # Total potential: 3,597+ but filtered to most valuable ~1,900

  auth_matrix:
    expand: true
    dimensions:
      - auth_methods
      - auth_values
    filter: "priority in [P0, P1]"

  email_matrix:
    expand: true
    dimensions:
      - valid_emails
      - templates
    sample_size: 150

  validation_matrix:
    expand: true
    dimensions:
      - invalid_emails
    sample_size: 50

  data_matrix:
    expand: true
    dimensions:
      - names
      - industries
    sample_size: 500  # Sample from full cartesian product
    stratified: true  # Ensure coverage of all categories

