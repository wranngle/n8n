        email: "test@example.com"
        first_name: "Test"
    expected:
      status: 401
    weight: 10

  - id: AUTH007
    name: "Wrong Secret - SMS Secret"
    priority: P0
    category: authentication
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
        Content-Type: "application/json"
      body:
        email: "test@example.com"
        first_name: "Test"
    expected:
      status: 401
    weight: 10

  - id: AUTH008
    name: "Empty Secret Header"
    priority: P0
    category: authentication
    input:
      headers:
        X-Webhook-Secret: ""
        Content-Type: "application/json"
      body:
        email: "test@example.com"
        first_name: "Test"
    expected:
      status: 401
    weight: 10

  - id: AUTH009
    name: "Wrong User-Agent"
    priority: P1
    category: authentication
    input:
      headers:
        User-Agent: "Mozilla/5.0"
        Content-Type: "application/json"
      body:
        email: "test@example.com"
        first_name: "Test"
    expected:
      status: 401
    weight: 5

  - id: AUTH010
    name: "Curl User-Agent"
    priority: P1
    category: authentication
    input:
      headers:
        User-Agent: "curl/7.68.0"
        Content-Type: "application/json"
      body:
        email: "test@example.com"
        first_name: "Test"
    expected:
      status: 401
    weight: 5

  # ==========================================
  # EMAIL VALIDATION SUITE (P0 - Core)
  # ==========================================

  # Valid Emails
  - id: EMAIL001
    name: "Valid Email - Standard"
    priority: P0
    category: email_validation
    input:
      headers:
        X-Webhook-Secret: "wranngle-email-2024"
