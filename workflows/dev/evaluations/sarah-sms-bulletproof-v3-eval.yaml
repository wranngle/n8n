# ============================================
# TEST SUITE: Error Handling (P1 - Reliability)
# ============================================
  - id: ERROR001
    name: "Twilio Error - Invalid Number"
    description: "Twilio 21211 error should return troubleshooting"
    priority: P1
    category: error_handling
    mock_twilio_response:
      error_code: 21211
      error_message: "Invalid 'To' Phone Number"
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
      body:
        phone_number: "+10000000000"
        caller_name: "Invalid Number"
    expected:
      status: 400
    assertions:
      - type: json_path_exists
        path: "$.troubleshooting"
    weight: 5
    skip_live: true  # Uses mock

  - id: ERROR002
    name: "Twilio Error - Landline"
    description: "Twilio 21614 error for landline numbers"
    priority: P1
    category: error_handling
    mock_twilio_response:
      error_code: 21614
      error_message: "Not a mobile number"
    expected:
      status: 400
      response_contains:
        - "landline"
        - "VoIP"
    weight: 5
    skip_live: true

  - id: ERROR003
    name: "Twilio Error - A2P Not Verified"
    description: "Twilio 30032 error should have clear troubleshooting"
    priority: P0
    category: error_handling
    mock_twilio_response:
      error_code: 30032
      error_message: "Toll-free number not verified"
    expected:
      status: 500
      response_contains:
        - "A2P"
        - "Twilio console"
    weight: 10
    skip_live: true

# ============================================
# TEST SUITE: Retry Logic (P1 - Reliability)
# ============================================
  - id: RETRY001
    name: "Retry on Temporary Error"
    description: "Retryable error should trigger retry logic"
    priority: P1
    category: retry_logic
    mock_twilio_sequence:
      - error_code: 30003
        error_message: "Destination unreachable"
      - error_code: 30003
        error_message: "Destination unreachable"
      - success: true
        sid: "SM_RETRY_SUCCESS"
    expected:
      status: [200, 202]
    assertions:
      - type: json_path
        path: "$.success"
        value: true
    weight: 10
    skip_live: true

  - id: RETRY002
    name: "Max Retries Exceeded"
    description: "After 3 failures should return MAX_RETRIES error"
    priority: P1
    category: retry_logic
    mock_twilio_sequence:
      - error_code: 30003
      - error_code: 30003
      - error_code: 30003
    expected:
      status: 500
      response_contains:
        - "MAX_RETRIES_EXCEEDED"
    weight: 10
    skip_live: true

  - id: RETRY003
    name: "Permanent Error No Retry"
    description: "Permanent errors (21211) should not retry"
    priority: P1
    category: retry_logic
    mock_twilio_response:
      error_code: 21211
    expected:
      status: 400
      response_contains:
        - "PERMANENT"
    assertions:
      - type: response_time_ms
        max: 5000  # Should be fast, no retries
    weight: 5
    skip_live: true

# ============================================
