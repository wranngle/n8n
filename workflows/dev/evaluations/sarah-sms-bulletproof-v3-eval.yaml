    expected:
      status: 200
    assertions:
      - type: json_path
        path: "$.verification"
        value: "CONFIRMED"
      - type: json_path_exists
        path: "$.delivery_status"
    weight: 10

  - id: DELIVERY002
    name: "Delivery Pending"
    description: "Pending delivery returns 202"
    priority: P1
    category: delivery_verification
    mock_twilio_status: "queued"
    expected:
      status: 202
    assertions:
      - type: json_path
        path: "$.status"
        value: "pending"
    weight: 5
    skip_live: true

