# Evaluation Configuration: Sarah SMS Tool - BULLETPROOF v3.0
# Workflow ID: TBD (deploy workflow first)
# Complexity: High (18+ nodes)
# Protocol: Hierarchical Development - Spec → Tests → Implementation

workflow_id: "uFFwYcr7XgdRCvdW"
workflow_name: "[DEV] Sarah SMS Tool - BULLETPROOF v3.0"
webhook_path: "sarah-send-sms-v3"

# Workflow Architecture:
# Webhook → Auth Check → Extract Params → Validate Phone → Compose Message
# → Twilio Send (with retry) → Delivery Verify → Route Response

evaluation:
  pass_threshold: 95  # Bulletproof means 95%+ pass rate
  max_retries: 2
  timeout_ms: 45000   # Longer timeout for retry logic

# ============================================
# TEST SUITE: Authentication (P0 - Security)
# ============================================
test_cases:
  - id: AUTH001
    name: "Valid Secret Header"
    description: "Request with correct X-Webhook-Secret should proceed"
    priority: P0
    category: authentication
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
        Content-Type: "application/json"
      body:
        phone_number: "+15551234567"
        caller_name: "Test User"
    expected:
      status: [200, 202]
      response_not_contains:
        - "UNAUTHORIZED"
    assertions:
      - type: status_code_not
        value: 401
    weight: 15

  - id: AUTH002
    name: "Missing Secret Header"
    description: "Request without auth header should be rejected"
    priority: P0
    category: authentication
    input:
      headers:
        Content-Type: "application/json"
      body:
        phone_number: "+15551234567"
        caller_name: "Test User"
    expected:
      status: 401
      response_contains:
        - "UNAUTHORIZED"
    assertions:
      - type: status_code
        value: 401
      - type: json_path
        path: "$.success"
        value: false
    weight: 15

  - id: AUTH003
    name: "Invalid Secret Header"
    description: "Request with wrong secret should be rejected"
    priority: P0
    category: authentication
    input:
      headers:
        X-Webhook-Secret: "wrong-secret-value"
        Content-Type: "application/json"
      body:
        phone_number: "+15551234567"
        caller_name: "Test User"
    expected:
      status: 401
    assertions:
      - type: json_path
        path: "$.error"
        value: "UNAUTHORIZED"
    weight: 10

  - id: AUTH004
    name: "ElevenLabs User-Agent Bypass"
    description: "ElevenLabs origin should bypass secret check"
    priority: P0
    category: authentication
    input:
      headers:
        User-Agent: "ElevenLabs/1.0"
        Content-Type: "application/json"
      body:
        phone_number: "+15551234567"
        caller_name: "Test User"
    expected:
      status: [200, 202]
    assertions:
      - type: status_code_not
        value: 401
    weight: 10

# ============================================
# TEST SUITE: Phone Validation (P0 - Core)
# ============================================
  - id: PHONE001
    name: "Valid US Phone - E.164"
    description: "Standard US number in E.164 format"
    priority: P0
    category: phone_validation
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
      body:
        phone_number: "+15551234567"
        caller_name: "John Smith"
    expected:
      status: [200, 202]
    assertions:
      - type: json_path
        path: "$.success"
        value: true
      - type: json_path_exists
        path: "$.message_sid"
    weight: 15

  - id: PHONE002
    name: "Valid Canadian Phone"
    description: "Canadian number should be accepted (+1 prefix)"
    priority: P0
    category: phone_validation
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
      body:
        phone_number: "+14165551234"
        caller_name: "Canadian User"
    expected:
      status: [200, 202]
    assertions:
      - type: json_path
        path: "$.success"
        value: true
    weight: 10

  - id: PHONE003
    name: "Valid UK Phone"
    description: "International UK number should be accepted"
    priority: P1
    category: phone_validation
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
      body:
        phone_number: "+447911123456"
        caller_name: "UK User"
    expected:
      status: [200, 202, 400]  # May fail due to intl restrictions
    assertions:
      - type: json_path_exists
        path: "$.recipient"
    weight: 5

  - id: PHONE004
    name: "Missing Phone Number"
    description: "Request with no phone should return 400"
    priority: P0
    category: phone_validation
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
      body:
        caller_name: "No Phone User"
    expected:
      status: 400
      response_contains:
        - "MISSING_PHONE_NUMBER"
    assertions:
      - type: json_path
        path: "$.error"
        value: "MISSING_PHONE_NUMBER"
      - type: json_path_exists
        path: "$.hint"
    weight: 10

  - id: PHONE005
    name: "Invalid Phone - Letters"
    description: "Phone with letters should be rejected"
    priority: P0
    category: phone_validation
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
      body:
        phone_number: "+1555CALLME"
        caller_name: "Bad Phone User"
    expected:
      status: 400
      response_contains:
        - "INVALID_PHONE_FORMAT"
    assertions:
      - type: json_path
        path: "$.error"
        value: "INVALID_PHONE_FORMAT"
    weight: 5

  - id: PHONE006
    name: "Invalid Phone - Too Short"
    description: "Phone with too few digits should be rejected"
    priority: P0
    category: phone_validation
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
      body:
        phone_number: "+1555"
        caller_name: "Short Phone"
    expected:
      status: 400
    assertions:
      - type: json_path
        path: "$.error"
        value: "INVALID_PHONE_FORMAT"
    weight: 5

  - id: PHONE007
    name: "Phone Normalization - Parentheses"
    description: "Phone with (XXX) format should be cleaned"
    priority: P1
    category: phone_validation
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
      body:
        phone_number: "(555) 123-4567"
        caller_name: "Formatted Phone"
    expected:
      status: 400  # Missing country code after cleaning
    assertions:
      - type: json_path_exists
        path: "$.cleaned"
    weight: 5

  - id: PHONE008
    name: "Phone Normalization - Dashes"
    description: "Phone with dashes should be cleaned to E.164"
    priority: P1
    category: phone_validation
    input:
      headers:
        X-Webhook-Secret: "wranngle-sms-2024-bulletproof"
      body:
        phone_number: "+1-555-123-4567"
        caller_name: "Dashed Phone"
    expected:
      status: [200, 202]
    assertions:
      - type: json_path
        path: "$.success"
        value: true
    weight: 5

