# Public workflow library registry.
#
# This file is intentionally about reusable demo patterns, not live n8n tenant
# workflow IDs. Runtime IDs, activation state, and customer-specific history
# belong in private deployment records.

version: "2.0"
last_updated: "2026-05-10"

states:
  draft:
    description: "Useful pattern, still being refined or missing import notes."
  published:
    description: "Ready to import after credentials and env placeholders are configured."
  retired:
    description: "Kept for reference, not recommended for new imports."

workflows:
  lead-intake-main:
    name: "Lead Intake Main"
    path: "workflows/lead-intake-main.json"
    state: published
    summary: "Captures inbound lead submissions, enriches the lead, persists it, notifies the team, and hands off to a downstream workflow."
    patterns:
      - webhook-intake
      - subworkflow-composition
      - crm-enrichment
      - notification-fanout
    integrations:
      - webhook
      - execute-workflow
      - postgres
      - email
      - http
    required_env:
      - WEBHOOK_BASE_URL
      - N8N_WEBHOOK_SECRET
    verification:
      local_json_parse: true
      public_export_check: true
      sample_execution: pending

