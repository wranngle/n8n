  # -----------------------------------------

  sarah-wranngle:
    id: "agent_8001kdgp7qbyf4wvhs540be78vew"
    name: "Sarah - Wranngle Lead Specialist v2.0"
    phase: PROD
    phone: "+18882662193"
    config_file: "agents/sarah/config.json"
    prompt_file: "agents/sarah/system-prompt.md"
    spec_file: "agents/sarah/tech-spec.md"
    scenario_file: "agents/sarah/tests/scenarios.yaml"
