# Voice Agent Registry v1.0
# Master index of all voice agents and their test scenarios
# Used by Voice Agent Tester v2.0 for multi-agent testing

version: "1.0"
last_updated: "2025-12-28"

# Default settings applied to all agents unless overridden
defaults:
  simulation_settings:
    llm: "gpt-4o"
    temperature: 0.7
    max_turns: 20
    timeout_ms: 120000
  alerting:
    webhook_url: "https://n8n.wranngle.com/webhook/voice-agent-test-alert"
    notify_on:
      - critical_failure
      - tool_validation_failure
      - success_rate_below: 80

