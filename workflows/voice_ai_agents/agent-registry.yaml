# Voice Agent Registry v2.0
# Master index of all voice agents and their test scenarios
# Used by Voice Agent Tester v2.0 for multi-agent testing
#
# Directory Structure (post-reorganization):
#   agents/sarah/       - Production B2B Sales SDR
#   pipelines/          - n8n workflow definitions
#   supersystem/        - Autonomous evaluation framework
#   Note: Historical agents archived in git history (old/ directory removed 2026-01-19)

version: "2.0"
last_updated: "2026-01-19"

# Default settings applied to all agents unless overridden
defaults:
  simulation_settings:
    llm: "gpt-4o"
    temperature: 0.7
    max_turns: 20
    timeout_ms: 120000
  alerting:
    webhook_url: "https://n8n.wranngle.com/webhook/voice-agent-test-alert"
    notify_on:
      - critical_failure
      - tool_validation_failure
      - success_rate_below: 80

# ============================================
# REGISTERED AGENTS
# ============================================

agents:
  # -----------------------------------------
