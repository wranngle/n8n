# ============================================
# TEST SUITE CONFIGURATIONS
# ============================================

test_suites:
  # Run all critical tests across all agents
  critical-regression:
    description: "Critical path tests for all production agents"
    agents:
      - sarah-wranngle
    filters:
      priority: critical
    schedule: "daily-6am"

  # Full regression for Sarah
  sarah-full:
    description: "Complete test suite for Sarah agent"
    agents:
      - sarah-wranngle
    filters:
      category: null  # All categories
    schedule: "weekly-sunday"

  # Development agent smoke tests
  dev-smoke:
    description: "Quick smoke test for development agents"
    agents:
      - sewy-garage
    filters:
      priority:
        - critical
        - high
    schedule: "on-demand"

  # Pre-promotion gate tests
  promotion-gate:
    description: "Tests required before promoting agent to next phase"
    filters:
      priority:
        - critical
        - high
      category:
        - happy_path
        - tool_validation
    required_pass_rate: 95
    required_tool_accuracy: 100

# ============================================
# CI/CD INTEGRATION
# ============================================

ci_cd:
  webhook_endpoint: "https://n8n.wranngle.com/webhook/voice-agent-test"
  supported_triggers:
    - manual
    - scheduled
    - github-actions
    - promotion-request

  quality_gates:
    block_on:
      - critical_failure_count: 1
      - success_rate_below: 80
      - tool_accuracy_below: 95

  github_actions:
    workflow_file: ".github/workflows/voice-agent-tests.yml"
    secrets_required:
      - ELEVENLABS_API_KEY
      - N8N_WEBHOOK_SECRET
