# Supersystem Webhook Test Scenarios
# Version: 1.0
# Created: 2025-12-29

metadata:
  version: "1.0"
  author: "Claude Code"
  system: "ElevenLabs Supersystem"
  base_url: "https://n8n.wranngle.com/webhook"
  
workflows:
  - id: "client-data-lookup"
    webhook_path: "/client-lookup-test"
    description: "Pre-call client data service"
    
  - id: "execution-logger"
    webhook_path: "/log-execution-test"
    description: "Post-call execution logging"
    
  - id: "slack-notifier"
    webhook_path: "/slack-notify-test"
    description: "Post-call Slack notifications"
    
  - id: "post-call-orchestrator"
    webhook_path: "/post-call-test"
    description: "Post-call orchestration hub"

scenarios:
  # ============================================================
  # CLIENT DATA LOOKUP SCENARIOS
  # ============================================================
  
  - id: "lookup-known-phone"
    workflow: "client-data-lookup"
    category: "happy_path"
    priority: "critical"
    description: "Look up a known client by phone number"
    payload:
      phone: "+15551234567"
    expected:
      status_code: 200
      response_contains:
        - "success"
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true
        - field: "latency_ms"
          operator: "less_than"
          value: 5000
          
  - id: "lookup-unknown-phone"
    workflow: "client-data-lookup"
    category: "edge_case"
    priority: "high"
    description: "Look up an unknown client - should return graceful null"
    payload:
      phone: "+19995550000"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true
        - field: "client"
          operator: "equals"
          value: null
          
  - id: "lookup-by-email"
    workflow: "client-data-lookup"
    category: "happy_path"
    priority: "high"
    description: "Look up client by email instead of phone"
    payload:
      email: "test@example.com"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true

  - id: "lookup-empty-payload"
    workflow: "client-data-lookup"
    category: "error_handling"
    priority: "medium"
    description: "Handle empty payload gracefully"
    payload: {}
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true
        - field: "client"
          operator: "equals"
          value: null

  # ============================================================
  # EXECUTION LOGGER SCENARIOS
  # ============================================================
  
  - id: "log-success-call"
    workflow: "execution-logger"
    category: "happy_path"
    priority: "critical"
    description: "Log a successful call execution"
    payload:
      conversation_id: "test_conv_001"
      agent_name: "Sarah"
      caller_phone: "+15551234567"
      duration_seconds: 180
      outcome: "success"
      extracted_fields:
        customer_name: "John Smith"
        inquiry_type: "demo_request"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true
        - field: "logged"
          operator: "exists"
        - field: "logged.conversation_id"
          operator: "equals"
          value: "test_conv_001"
        - field: "logged.outcome"
          operator: "equals"
          value: "success"

  - id: "log-failure-call"
    workflow: "execution-logger"
    category: "edge_case"
    priority: "high"
    description: "Log a failed call execution"
    payload:
      conversation_id: "test_conv_002"
      agent_name: "Sarah"
      outcome: "failure"
      errors: "Connection timeout"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true
        - field: "logged.outcome"
          operator: "equals"
          value: "failure"
        - field: "logged.errors"
          operator: "equals"
          value: "Connection timeout"

  - id: "log-minimal-payload"
    workflow: "execution-logger"
    category: "edge_case"
    priority: "medium"
    description: "Log with minimal required fields only"
    payload:
      conversation_id: "test_conv_003"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true
        - field: "logged.agent_name"
          operator: "equals"
          value: "unknown"

  # ============================================================
  # SLACK NOTIFIER SCENARIOS
  # ============================================================
  
  - id: "notify-success-call"
    workflow: "slack-notifier"
    category: "happy_path"
    priority: "critical"
    description: "Send success notification to Slack"
    payload:
      conversation_id: "test_conv_001"
      agent_name: "Sarah"
      caller_phone: "+15551234567"
      duration_seconds: 180
      outcome: "success"
      summary: "Customer inquired about demo scheduling"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true
        - field: "slackPayload"
          operator: "exists"
        - field: "slackPayload.blocks"
          operator: "is_array"

  - id: "notify-failure-call"
    workflow: "slack-notifier"
    category: "edge_case"
    priority: "high"
    description: "Send failure notification to Slack"
    payload:
      agent_name: "Sarah"
      outcome: "failure"
      duration_seconds: 15
      summary: "Call failed to connect"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true
        - field: "slackPayload.blocks[0].text.text"
          operator: "contains"
          value: "❌"

  - id: "notify-unknown-outcome"
    workflow: "slack-notifier"
    category: "edge_case"
    priority: "medium"
    description: "Handle unknown outcome gracefully"
    payload:
      agent_name: "Sarah"
      outcome: "unknown"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "success"
          operator: "equals"
          value: true
        - field: "slackPayload.blocks[0].text.text"
          operator: "contains"
          value: "❓"

  # ============================================================
  # POST-CALL ORCHESTRATOR SCENARIOS
  # ============================================================
  
  - id: "orchestrate-full-flow"
    workflow: "post-call-orchestrator"
    category: "happy_path"
    priority: "critical"
    description: "Full post-call orchestration with all subworkflows"
    payload:
      conversation_id: "test_orch_001"
      agent_name: "Sarah"
      caller_phone: "+15551234567"
      duration_seconds: 180
      outcome: "success"
      event_type: "post_call_transcription"
    expected:
      status_code: 200
      response_type: "json"
      timeout_ms: 30000
      assertions:
        - field: "orchestration_complete"
          operator: "equals"
          value: true
        - field: "all_success"
          operator: "equals"
          value: true
        - field: "subworkflow_results.execution_logger"
          operator: "exists"
        - field: "subworkflow_results.slack_notifier"
          operator: "exists"

  - id: "orchestrate-failure-event"
    workflow: "post-call-orchestrator"
    category: "edge_case"
    priority: "high"
    description: "Orchestrate failure event"
    payload:
      conversation_id: "test_orch_002"
      agent_name: "Sarah"
      outcome: "failure"
      event_type: "call_initiation_failure"
      errors: "Network timeout"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "orchestration_complete"
          operator: "equals"
          value: true
        - field: "subworkflow_results"
          operator: "exists"

  - id: "orchestrate-minimal-payload"
    workflow: "post-call-orchestrator"
    category: "error_handling"
    priority: "medium"
    description: "Orchestrate with minimal data"
    payload:
      conversation_id: "test_orch_003"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "orchestration_complete"
          operator: "equals"
          value: true

  - id: "orchestrate-with-transcript"
    workflow: "post-call-orchestrator"
    category: "happy_path"
    priority: "high"
    description: "Orchestrate when transcript is available"
    payload:
      conversation_id: "test_orch_004"
      agent_name: "Sarah"
      outcome: "success"
      transcript_available: true
      data:
        transcript: "Sample transcript text"
    expected:
      status_code: 200
      response_type: "json"
      assertions:
        - field: "orchestration_complete"
          operator: "equals"
          value: true

# Test execution configuration
execution:
  parallel: false
  continue_on_failure: true
  retry_count: 1
  retry_delay_ms: 1000
  default_timeout_ms: 10000
