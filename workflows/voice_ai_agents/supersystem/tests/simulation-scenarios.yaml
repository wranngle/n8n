# Supersystem Integration Test Scenarios v1.0
# Uses ElevenLabs simulate-conversation API for real agent simulations
# Tests the full integration: Voice Agent ↔ Supersystem Webhooks
# 
# Created: 2025-12-29

version: "1.0"
last_updated: "2025-12-29"

# Agent under test - Sarah is configured with Supersystem webhooks
default_agent_id: "agent_8001kdgp7qbyf4wvhs540be78vew"

# Simulation settings
simulation_settings:
  llm: "gemini-2.0-flash"
  temperature: 0.8
  max_turns: 25
  timeout_ms: 120000
  delay_between_scenarios_ms: 5000

# Supersystem webhook configuration (for verification)
supersystem_webhooks:
  client_lookup: "https://n8n.wranngle.com/webhook/client-lookup-test"
  post_call: "https://n8n.wranngle.com/webhook/post-call-test"
  execution_logger: "https://n8n.wranngle.com/webhook/log-execution-test"
  slack_notifier: "https://n8n.wranngle.com/webhook/slack-notify-test"

# ============================================
# SUPERSYSTEM INTEGRATION SCENARIOS
# ============================================
# These scenarios test the full voice agent → supersystem flow

scenarios:
  # ============================================
  # PRE-CALL: CLIENT DATA INJECTION
  # Tests that agent receives and uses client context
  # ============================================

  - id: known-client-greeting
    name: "Known Client - Personalized Greeting"
    category: pre_call_integration
    priority: critical
    description: "Tests that agent uses injected client data for personalization"
    tags:
      - client-lookup
      - personalization
      - integration
    simulated_user_prompt: |
      You are Dr. Smith from Acme Dental. You've called before.
      Notice if the agent seems to know who you are or recognizes your number.
      You want to schedule another demo for your new office location.
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: recognized_caller
        name: "Recognized returning caller"
        prompt: "The agent showed signs of recognizing the caller or having prior context."
        weight: 1.0
      - id: personalized_greeting
        name: "Personalized greeting"
        prompt: "The agent's greeting felt personalized rather than generic."
        weight: 0.8
      - id: completed_booking
        name: "Completed booking flow"
        prompt: "The agent successfully completed the booking flow with SMS."
        weight: 1.0

  - id: new-client-discovery
    name: "New Client - Full Discovery"
    category: pre_call_integration
    priority: critical
    description: "New caller with no prior data - tests graceful handling"
    tags:
      - client-lookup
      - new-caller
      - discovery
    simulated_user_prompt: |
      You are Maria, calling for the first time. You run a pet grooming business.
      You heard about AI voice agents from a friend and want to learn more.
      Your number is 555-888-9999.
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: full_discovery
        name: "Full discovery process"
        prompt: "The agent gathered name, business type, and contact info for a new caller."
        weight: 1.0
      - id: no_assumed_context
        name: "No assumed context"
        prompt: "The agent did not pretend to know the caller or make incorrect assumptions."
        weight: 1.0
      - id: sent_booking_sms
        name: "Sent booking SMS"
        prompt: "The agent successfully sent the booking SMS after getting permission."
        weight: 1.0

  # ============================================
  # POST-CALL: ORCHESTRATION TRIGGERS
  # Tests that conversations properly trigger post-call workflows
  # ============================================

  - id: successful-call-orchestration
    name: "Successful Call - Full Orchestration"
    category: post_call_integration
    priority: critical
    description: "Successful call should trigger all post-call subworkflows"
    tags:
      - orchestrator
      - execution-logger
      - slack-notifier
    simulated_user_prompt: |
      You are Jake from a law firm. You want to learn about AI voice agents.
      Be cooperative and answer all questions. When offered, agree to receive the SMS.
      Your phone is 555-777-1234. Complete the full conversation naturally.
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: natural_conversation
        name: "Natural conversation flow"
        prompt: "The conversation flowed naturally from greeting to booking."
        weight: 1.0
      - id: collected_all_info
        name: "Collected all required info"
        prompt: "The agent collected name, phone, and business type before sending SMS."
        weight: 1.0
      - id: proper_sms_flow
        name: "Proper SMS permission flow"
        prompt: "The agent asked permission before sending SMS and confirmed delivery after."
        weight: 1.0

  - id: failed-call-logging
    name: "Failed Call - Error Logging"
    category: post_call_integration
    priority: high
    description: "Failed/incomplete calls should still trigger logging"
    tags:
      - orchestrator
      - error-handling
      - logging
    simulated_user_prompt: |
      You are extremely busy and impatient. You called by accident.
      Say "Wrong number, sorry" and hang up immediately.
      Do NOT engage in any conversation.
    expected_tool_calls: []
    evaluation_criteria:
      - id: graceful_exit
        name: "Graceful exit"
        prompt: "The agent allowed the caller to exit gracefully without pushiness."
        weight: 1.0
      - id: brief_interaction
        name: "Brief interaction"
        prompt: "The conversation was appropriately brief given the caller's desire to leave."
        weight: 1.0

  # ============================================
  # SMS TOOL INTEGRATION
  # Tests the send_sms tool triggers notification subworkflows
  # ============================================

  - id: sms-success-notification
    name: "SMS Success - Slack Notification"
    category: tool_integration
    priority: critical
    description: "Successful SMS should trigger Slack notification"
    tags:
      - send_sms
      - slack-notifier
      - happy-path
    simulated_user_prompt: |
      You are calling about AI voice agents for your restaurant.
      Your name is Tony. Phone is 555-PIZZA (555-749-9211).
      You want the booking link texted to you. Be quick and efficient.
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: collected_phone
        name: "Collected phone number"
        prompt: "The agent asked for and correctly understood the phone number."
        weight: 1.0
      - id: got_sms_permission
        name: "Got SMS permission"
        prompt: "The agent explicitly asked for permission before sending SMS."
        weight: 1.0
      - id: confirmed_sms_sent
        name: "Confirmed SMS sent"
        prompt: "The agent confirmed the SMS was sent after the tool executed."
        weight: 1.0
      - id: no_premature_confirm
        name: "No premature confirmation"
        prompt: "The agent did NOT say SMS was sent before the tool actually ran."
        weight: 1.0

  - id: sms-declined-no-notification
    name: "SMS Declined - No Trigger"
    category: tool_integration
    priority: high
    description: "Declined SMS should NOT trigger SMS-related notifications"
    tags:
      - send_sms
      - declined
      - edge-case
    simulated_user_prompt: |
      You are interested in AI voice agents for your accounting firm.
      When offered the SMS, say "No thanks, I prefer email" or "Just tell me the URL".
      Do NOT consent to receiving a text message under any circumstances.
    expected_tool_calls: []
    forbidden_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: respected_preference
        name: "Respected SMS decline"
        prompt: "The agent respected the caller's preference not to receive SMS."
        weight: 1.0
      - id: no_unauthorized_sms
        name: "No unauthorized SMS"
        prompt: "The agent did NOT send an SMS without explicit consent."
        weight: 1.0
      - id: offered_alternative
        name: "Offered alternative"
        prompt: "The agent offered the website URL or email as an alternative."
        weight: 0.8

  # ============================================
  # DATA EXTRACTION SCENARIOS
  # Tests that transcript extraction captures required fields
  # ============================================

  - id: full-data-extraction
    name: "Full Data Extraction - All Fields"
    category: data_extraction
    priority: critical
    description: "Comprehensive conversation that exercises all extractable fields"
    tags:
      - transcript-extractor
      - field-extraction
      - comprehensive
    simulated_user_prompt: |
      You are Sarah Johnson, CEO of TechStart Inc., a software company with 50 employees.
      Your email is sarah@techstart.io. Phone is 555-TECH (555-8324).
      You're interested in AI voice agents to handle customer support calls.
      You currently receive about 200 calls per day. Your main pain point is missed calls after hours.
      Budget is around $5000/month. You'd like to start with a demo next week.
      Be thorough in explaining your needs - you want to make sure this is a good fit.
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: collected_name
        name: "Collected full name"
        prompt: "The agent collected the caller's full name (Sarah Johnson)."
        weight: 1.0
      - id: collected_company
        name: "Collected company name"
        prompt: "The agent collected the company name (TechStart Inc)."
        weight: 1.0
      - id: collected_industry
        name: "Collected industry/use case"
        prompt: "The agent understood this is a software company wanting customer support."
        weight: 0.8
      - id: collected_volume
        name: "Collected call volume"
        prompt: "The agent noted the call volume (200 calls/day)."
        weight: 0.8
      - id: identified_pain_point
        name: "Identified pain point"
        prompt: "The agent identified the main pain point (missed after-hours calls)."
        weight: 0.8
      - id: discussed_budget
        name: "Discussed budget"
        prompt: "The agent addressed the budget topic appropriately."
        weight: 0.6
      - id: scheduled_next_step
        name: "Scheduled next step"
        prompt: "The agent moved toward scheduling a demo."
        weight: 1.0

  - id: minimal-data-extraction
    name: "Minimal Data Extraction - Quick Call"
    category: data_extraction
    priority: high
    description: "Short call with minimal data - tests graceful handling"
    tags:
      - transcript-extractor
      - minimal
      - edge-case
    simulated_user_prompt: |
      You are in a hurry but cooperative. Say "Hi, I want to book a demo. My name is Bob, phone 555-123-1111. Yes you can text me the link."
      Keep responses short but answer any direct questions briefly.
      Your goal is to get the booking link texted to you as quickly as possible.
      When asked for permission to text, say "Yes, go ahead" or "Sure, text me".
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: efficient_handling
        name: "Efficient handling"
        prompt: "The agent efficiently handled the quick caller without dragging out the call."
        weight: 1.0
      - id: collected_minimum_fields
        name: "Collected minimum required fields"
        prompt: "The agent collected at least name and phone number."
        weight: 1.0
      - id: completed_task
        name: "Completed the task"
        prompt: "The agent successfully sent the SMS with the info provided."
        weight: 1.0

  # ============================================
  # STRESS TEST SCENARIOS
  # Edge cases that stress the supersystem integration
  # ============================================

  - id: rapid-fire-questions
    name: "Rapid Fire Questions"
    category: stress_test
    priority: medium
    description: "Caller asks many questions in rapid succession"
    tags:
      - stress
      - comprehension
    simulated_user_prompt: |
      You are a rapid talker. Ask these questions all at once without waiting for answers:
      "What's your pricing? Do you integrate with Salesforce? How long does setup take?
      Can I see a demo? Is there a free trial? What about HIPAA compliance?"
      Then wait for the agent to respond to at least some of these.
    expected_tool_calls: []
    evaluation_criteria:
      - id: addressed_multiple_questions
        name: "Addressed multiple questions"
        prompt: "The agent attempted to address multiple questions from the barrage."
        weight: 1.0
      - id: stayed_composed
        name: "Stayed composed"
        prompt: "The agent remained composed and didn't get flustered."
        weight: 0.8
      - id: offered_to_slow_down
        name: "Managed the pace"
        prompt: "The agent either answered or offered to take questions one at a time."
        weight: 0.6

  - id: long-conversation
    name: "Extended Conversation - 15+ Turns"
    category: stress_test
    priority: medium
    description: "Extended conversation to test agent stamina and context retention"
    tags:
      - stress
      - context-retention
      - long-form
    simulated_user_prompt: |
      You are very thorough and want to understand everything before committing.
      Ask about: pricing tiers, setup process, training requirements, support options,
      cancellation policy, customer references, integration options, and security measures.
      Take your time - ask one or two questions at a time and wait for full answers.
      Your name is Patricia and your company is LongForm LLC.
      Eventually, if satisfied, agree to receive the SMS for booking.
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: maintained_context
        name: "Maintained context throughout"
        prompt: "The agent maintained context of the conversation over many turns."
        weight: 1.0
      - id: answered_all_categories
        name: "Addressed major topics"
        prompt: "The agent addressed most of the major question categories raised."
        weight: 0.8
      - id: natural_progression
        name: "Natural progression"
        prompt: "The conversation progressed naturally toward booking despite length."
        weight: 0.8
      - id: remembered_name
        name: "Remembered caller info"
        prompt: "The agent remembered the caller's name/company throughout."
        weight: 1.0

  # ============================================
  # ERROR RECOVERY SCENARIOS
  # Tests system resilience when things go wrong
  # ============================================

  - id: garbled-phone-number
    name: "Garbled Phone Number - Recovery"
    category: error_recovery
    priority: high
    description: "Caller provides unclear phone number requiring clarification"
    tags:
      - error-recovery
      - phone-validation
    simulated_user_prompt: |
      You are calling about AI voice agents. Your name is Chris.
      When asked for your phone number, mumble it unclearly: "It's five five five... uh... 
      one two... wait, three four... no, one two three four".
      If the agent asks for clarification, then say it clearly: "555-123-4567".
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: sought_clarification
        name: "Sought clarification"
        prompt: "The agent asked for the phone number to be repeated or clarified."
        weight: 1.0
      - id: confirmed_number
        name: "Confirmed the number"
        prompt: "The agent confirmed the phone number before sending SMS."
        weight: 1.0
      - id: patient_handling
        name: "Patient handling"
        prompt: "The agent handled the confusion patiently without frustration."
        weight: 0.8

  - id: interrupted-mid-flow
    name: "Interrupted Mid-Flow"
    category: error_recovery
    priority: medium
    description: "Caller interrupts agent mid-sentence"
    tags:
      - error-recovery
      - interruption
    simulated_user_prompt: |
      You are interested but impatient. Interrupt the agent frequently.
      When they start explaining pricing, cut them off and say "Just send me the link".
      When they ask for your phone, interrupt with "555-999-0000" before they finish asking.
      Your name is Alex.
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: handled_interruptions
        name: "Handled interruptions"
        prompt: "The agent handled being interrupted without getting confused."
        weight: 1.0
      - id: completed_task
        name: "Completed task despite interruptions"
        prompt: "The agent still managed to complete the SMS sending despite interruptions."
        weight: 1.0
      - id: adapted_pace
        name: "Adapted to caller's pace"
        prompt: "The agent adapted to the caller's impatient style."
        weight: 0.8

# ============================================
# RANDOMIZED SCENARIO GENERATION
# For running 100+ novel simulations
# ============================================

random_scenario_templates:
  - template_id: "random-industry"
    description: "Random industry caller"
    base_prompt: |
      You are calling about AI voice agents for your {industry} business.
      Your name is {name}. You have about {call_volume} calls per day.
      You're {interest_level} in learning more.
    variables:
      industry:
        - dental practice
        - law firm
        - real estate agency
        - auto repair shop
        - accounting firm
        - medical clinic
        - veterinary clinic
        - insurance agency
        - restaurant
        - salon/spa
        - plumbing company
        - HVAC service
        - property management
        - fitness studio
      name:
        - John
        - Sarah
        - Michael
        - Jennifer
        - David
        - Lisa
        - Robert
        - Amanda
        - Chris
        - Emily
      call_volume:
        - 10-20
        - 30-50
        - 50-100
        - 100-200
        - 200+
      interest_level:
        - very interested
        - somewhat interested
        - curious but skeptical
        - just exploring options

  - template_id: "random-objection"
    description: "Random objection handling"
    base_prompt: |
      You are interested in AI voice agents but have a concern about {objection}.
      Your name is {name}. Ask tough questions about {objection}.
      If the agent handles it well, warm up and consider booking.
    variables:
      objection:
        - pricing being too high
        - technology being too new
        - not trusting AI with customers
        - worried about setup complexity
        - concerned about data privacy
        - unsure if it works for your industry
      name:
        - Tom
        - Karen
        - Steve
        - Michelle
        - Paul
        - Angela

# Execution configuration
execution:
  parallel: false
  continue_on_failure: true
  retry_count: 2
  retry_delay_ms: 5000
  default_timeout_ms: 120000
  
  # Random scenario generation settings
  random_generation:
    enabled: true
    count: 50  # Generate 50 random scenarios per run
    seed: null  # null = truly random, or set a number for reproducibility
