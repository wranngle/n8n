# Comprehensive Workflow Evaluation Suite
# Integrates with Supersystem Engine for self-improvement
#
# Created: 2025-12-30
# Purpose: Test all n8n workflows and feed results into improvement loop

version: "1.0"
last_updated: "2025-12-30"

# Webhook base URL
base_url: "https://n8n.wranngle.com/webhook"

# ============================================
# SUPERSYSTEM WEBHOOK EVALUATIONS
# ============================================

workflows:
  # ----------------------------------------
  # CLIENT DATA LOOKUP
  # ----------------------------------------
  - id: client-data-lookup
    name: "Client Data Lookup Service"
    webhook_path: "/client-lookup-test"
    description: "Pre-call client data injection for personalization"
    test_cases:
      - id: known-phone-lookup
        name: "Known Phone Number Lookup"
        input:
          phone: "+15551234567"
        expected:
          success: true
          has_client_data: true
        timeout_ms: 5000

      - id: unknown-phone-lookup
        name: "Unknown Phone Number"
        input:
          phone: "+19999999999"
        expected:
          success: true
          has_client_data: false
        timeout_ms: 5000

      - id: email-lookup
        name: "Email Address Lookup"
        input:
          email: "test@example.com"
        expected:
          success: true
        timeout_ms: 5000

      - id: conversation-id-lookup
        name: "Conversation ID Lookup"
        input:
          conversation_id: "conv_test_123"
        expected:
          success: true
        timeout_ms: 5000

    evaluation_criteria:
      - metric: response_time_ms
        threshold: 5000
        operator: "<"
      - metric: success_rate
        threshold: 95
        operator: ">="

  # ----------------------------------------
  # EXECUTION LOGGER
  # ----------------------------------------
  - id: execution-logger
    name: "Execution Logger Service"
    webhook_path: "/log-execution-test"
    description: "Logs all call executions for observability"
    test_cases:
      - id: successful-call-log
        name: "Log Successful Call"
        input:
          conversation_id: "conv_test_success"
          agent_id: "agent_8001kdgp7qbyf4wvhs540be78vew"
          event_type: "post_call_transcription"
          duration_seconds: 180
          outcome: "success"
          caller_phone: "+15551234567"
        expected:
          logged: true
        timeout_ms: 3000

      - id: failed-call-log
        name: "Log Failed Call"
        input:
          conversation_id: "conv_test_failed"
          agent_id: "agent_8001kdgp7qbyf4wvhs540be78vew"
          event_type: "call_initiation_failure"
          outcome: "failed"
          error: "connection_timeout"
        expected:
          logged: true
        timeout_ms: 3000

      - id: bulk-log-stress
        name: "Bulk Logging Stress Test"
        input:
          batch: true
          count: 10
        expected:
          all_logged: true
        timeout_ms: 10000

    evaluation_criteria:
      - metric: response_time_ms
        threshold: 3000
        operator: "<"
      - metric: data_integrity
        threshold: 100
        operator: "=="

  # ----------------------------------------
  # SLACK NOTIFIER
  # ----------------------------------------
  - id: slack-notifier
    name: "Slack Notifier Service"
    webhook_path: "/slack-notify-test"
    description: "Sends call summaries to Slack"
    test_cases:
      - id: success-notification
        name: "Successful Call Notification"
        input:
          caller_name: "Test User"
          company: "Test Corp"
          outcome: "demo_scheduled"
          summary: "Caller interested in AI voice agents, scheduled demo for next week."
        expected:
          sent: true
        timeout_ms: 5000

      - id: failure-notification
        name: "Failed Call Alert"
        input:
          caller_name: "Unknown"
          outcome: "call_failed"
          error: "agent_unavailable"
          severity: "high"
        expected:
          sent: true
        timeout_ms: 5000

    evaluation_criteria:
      - metric: delivery_success
        threshold: 99
        operator: ">="

  # ----------------------------------------
  # POST-CALL ORCHESTRATOR
  # ----------------------------------------
  - id: post-call-orchestrator
    name: "Post-Call Orchestrator"
    webhook_path: "/post-call-test"
    description: "Routes post-call events to appropriate subworkflows"
    test_cases:
      - id: full-orchestration
        name: "Full Post-Call Orchestration"
        input:
          conversation_id: "conv_orch_test"
          agent_id: "agent_8001kdgp7qbyf4wvhs540be78vew"
          event_type: "post_call_transcription"
          transcript: "Test conversation transcript"
          tool_calls:
            - name: "send_sms"
              success: true
        expected:
          orchestrated: true
          subworkflows_called: ["transcript_extraction", "execution_logger", "slack_notifier"]
        timeout_ms: 30000

      - id: failure-handling
        name: "Failed Call Handling"
        input:
          conversation_id: "conv_orch_fail"
          event_type: "call_initiation_failure"
          error: "no_answer"
        expected:
          orchestrated: true
          logged: true
        timeout_ms: 10000

    evaluation_criteria:
      - metric: orchestration_success
        threshold: 95
        operator: ">="
      - metric: subworkflow_completion
        threshold: 100
        operator: "=="

# ============================================
# TRANSCRIPT EXTRACTION EVALUATIONS
# ============================================

  - id: transcript-field-extractor
    name: "Transcript Field Extractor v2"
    webhook_path: "/extract-transcript"
    description: "Extracts structured data from conversation transcripts"
    test_cases:
      - id: full-field-extraction
        name: "Extract All Fields"
        input:
          transcript: |
            Agent: Hi, this is Sarah from Wranngle. How can I help?
            Caller: Hi, I'm John Smith from Acme Corp. I'd like to learn about AI voice agents.
            Agent: Great! What industry is Acme Corp in?
            Caller: We're in manufacturing. We get about 200 calls per day and miss a lot after hours.
            Agent: I understand. What's your email and phone so we can follow up?
            Caller: john@acme.com and 555-123-4567.
        expected:
          extracted_fields:
            - caller_name
            - company_name
            - industry
            - call_volume
            - pain_point
            - email
            - phone
        timeout_ms: 30000

      - id: minimal-extraction
        name: "Minimal Data Extraction"
        input:
          transcript: "Caller: Hi, I'm Bob. Phone is 555-1111."
        expected:
          extracted_fields:
            - caller_name
        timeout_ms: 15000

      - id: complex-extraction
        name: "Complex Multi-Topic Extraction"
        input:
          transcript: |
            Long conversation about pricing, competitors, integrations, timeline...
        expected:
          extracted_fields:
            - caller_name
            - key_topics
            - objections
            - next_steps
        timeout_ms: 45000

    evaluation_criteria:
      - metric: field_accuracy
        threshold: 85
        operator: ">="
      - metric: processing_time_ms
        threshold: 30000
        operator: "<"

# ============================================
# SMS TOOL EVALUATIONS
# ============================================

  - id: sarah-sms-tool
    name: "Sarah SMS Tool"
    webhook_path: "/sarah-sms"
    description: "Sends booking SMS to callers"
    test_cases:
      - id: valid-sms-send
        name: "Send SMS to Valid Number"
        input:
          phone: "+15551234567"
          caller_name: "Test User"
          booking_url: "https://cal.com/wranngle/demo"
        expected:
          sent: true
          sid_present: true
        timeout_ms: 10000

      - id: invalid-number-handling
        name: "Handle Invalid Number"
        input:
          phone: "invalid"
          caller_name: "Test User"
        expected:
          sent: false
          error_handled: true
        timeout_ms: 5000

    evaluation_criteria:
      - metric: delivery_rate
        threshold: 95
        operator: ">="

# ============================================
# INTEGRATION SETTINGS
# ============================================

integration:
  # Feed results into supersystem improvement loop
  supersystem_integration:
    enabled: true
    feedback_webhook: "/evaluation-feedback"
    auto_remediation: true

  # Thresholds for triggering improvements
  improvement_triggers:
    - metric: overall_pass_rate
      threshold: 95
      action: flag_for_review
    - metric: response_time_p99
      threshold: 10000
      action: optimize_workflow
    - metric: error_rate
      threshold: 5
      action: investigate_errors

  # How often to run full evaluation suite
  schedule:
    full_suite: "0 */6 * * *"  # Every 6 hours
    smoke_tests: "*/30 * * * *"  # Every 30 minutes
