    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: confirmed_sms_sent
        name: "Confirmed SMS sent"
        prompt: "The agent confirmed the demo link was sent."
        weight: 0.9
      - id: gave_instructions
        name: "Gave demo instructions"
        prompt: "The agent instructed to try the demo with emergency and routine scenarios."
        weight: 0.8
      - id: mentioned_followup
        name: "Mentioned follow-up"
        prompt: "The agent mentioned they'll follow up in a day or two."
        weight: 0.7
      - id: proper_goodbye
        name: "Proper goodbye"
        prompt: "The agent ended with an appropriate goodbye (Thanks for your time, not Thanks for calling on outbound)."
        weight: 0.8

  - id: closing-outbound-proper
    name: "Closing - Outbound Proper Goodbye"
    category: closing
    priority: medium
    description: "Validates outbound closing doesn't say 'thanks for calling'"
    tags:
      - v2.0
      - closing
      - call-direction
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're wrapping up an outbound call. You're not interested right now but polite.
      Say "Thanks, I'll think about it. Goodbye."
    expected_tool_calls: []
    evaluation_criteria:
      - id: no_thanks_for_calling_close
        name: "No 'thanks for calling' in close"
        prompt: "The agent did NOT say 'thanks for calling Wranngle Systems' since this was an outbound call."
        weight: 1.0
        severity: high
      - id: appropriate_outbound_close
        name: "Appropriate outbound close"
        prompt: "The agent used appropriate outbound closing like 'Thanks for your time' rather than 'Thanks for calling'."
        weight: 0.9

# ============================================
# EVALUATION AGGREGATION RULES
# ============================================

scoring:
  pass_threshold: 0.80
  critical_threshold: 1.0  # All critical items must pass
  weights:
    call_direction: 1.2    # Critical for v2.0
    value_proposition: 1.1
    demo_close: 1.1
    forbidden_language: 1.2
    emergency: 1.3
    pain_agitation: 1.0
    discovery: 1.0
    pricing: 0.9
    objection_handling: 0.9
    word_economy: 0.7
    closing: 0.8
    tool_failure: 1.0

alerts:
  critical_failure:
    - outbound_awareness
    - forbidden_language
    - emergency_redirect
  webhook: "https://n8n.wranngle.com/webhook/sarah-v2-test-alert"
