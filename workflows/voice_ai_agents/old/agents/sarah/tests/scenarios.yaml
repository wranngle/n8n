# Sarah v2.0 Test Scenarios - B2B Sales SDR Validation
# Used by: ElevenLabs simulate_conversation API
# Version: 2.0 (Complete overhaul from receptionist to B2B Sales SDR)
# Last Updated: 2026-01-13

version: "2.0"
agent_id: "agent_8001kdgp7qbyf4wvhs540be78vew"

simulation_settings:
  llm: "gpt-4o"
  temperature: 0.7
  max_turns: 15
  timeout_ms: 120000

# ============================================
# CRITICAL V2.0 VALIDATION SCENARIOS
# ============================================

scenarios:
  # ============================================
  # CALL DIRECTION AWARENESS (CRITICAL)
  # ============================================

  - id: outbound-awareness-hvac
    name: "Outbound Awareness - HVAC Owner"
    category: call_direction
    priority: critical
    description: "Validates agent doesn't say 'How can I help you?' on outbound calls"
    tags:
      - v2.0
      - call-direction
      - critical
      - regression
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You are Mike, owner of Mike's HVAC Services. You just received an unsolicited call.
      You're busy but willing to listen for a moment. Be neutral at first.
      If the agent asks "how can I help you" or "thanks for calling", immediately point out
      that THEY called YOU and you find that confusing.
    expected_tool_calls: []
    evaluation_criteria:
      - id: no_how_can_i_help
        name: "No 'how can I help you'"
        prompt: "The agent NEVER said 'how can I help you' or similar phrases since this is an outbound call where the agent called the prospect."
        weight: 1.0
        severity: critical
      - id: no_thanks_for_calling
        name: "No 'thanks for calling'"
        prompt: "The agent NEVER said 'thanks for calling' since this is an outbound call."
        weight: 1.0
        severity: critical
      - id: immediate_value_prop
        name: "Value prop in first 10 seconds"
        prompt: "The agent immediately delivered a value proposition about after-hours AI hotlines within their first speaking turn."
        weight: 1.0
        severity: high
      - id: permission_based_ask
        name: "Permission-based continuation"
        prompt: "The agent asked permission to continue ('Do you have a sec?', 'Do you have about two minutes?') after their opening."
        weight: 0.8

  - id: inbound-awareness-inquiry
    name: "Inbound Awareness - Inquiry Call"
    category: call_direction
    priority: critical
    description: "Validates proper inbound handling with 'What prompted your call?'"
    tags:
      - v2.0
      - call-direction
      - critical
    dynamic_variables:
      call_direction: "inbound"
    simulated_user_prompt: |
      You're Sarah, a property manager who found Wranngle online. You're calling to learn more.
      You have about 30 units and deal with tenant emergencies after hours.
    expected_tool_calls: []
    evaluation_criteria:
      - id: appropriate_inbound_greeting
        name: "Appropriate inbound greeting"
        prompt: "The agent used an appropriate inbound greeting, asking what prompted the call or how they can help."
        weight: 1.0
      - id: value_prop_included
        name: "Value prop included"
        prompt: "The agent included their value proposition about digital employees or 24/7 phone coverage."
        weight: 0.9

  # ============================================
  # VALUE PROPOSITION & HOOK (First 10 Seconds)
  # ============================================

  - id: hook-delivery-cold-call
    name: "Hook Delivery - Cold Call"
    category: value_proposition
    priority: critical
    description: "Validates value prop delivered in first 10 seconds with concrete example"
    tags:
      - v2.0
      - hook
      - critical
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're Tom, a busy plumbing contractor. You answer the phone gruffly with just "Yeah?"
      You'll hang up if the caller doesn't quickly explain why they're calling.
      Give them about 15 seconds to make their point.
    expected_tool_calls: []
    evaluation_criteria:
      - id: identity_stated
        name: "Identity stated"
        prompt: "The agent identified themselves as Sarah from Wranngle Systems."
        weight: 0.8
      - id: service_explained
        name: "Service explained clearly"
        prompt: "The agent explained they build after-hours AI hotlines or digital employees within the first turn."
        weight: 1.0
      - id: concrete_example
        name: "Concrete pain example"
        prompt: "The agent gave a concrete example like 'burst pipe at 2 AM' or similar industry-specific emergency scenario."
        weight: 1.0
        severity: high
      - id: emergency_vs_routine
        name: "Emergency vs routine contrast"
        prompt: "The agent contrasted emergency situations vs routine calls that can wait."
        weight: 0.9

  # ============================================
  # INDUSTRY-SPECIFIC PAIN AGITATION
  # ============================================

  - id: pain-agitation-hvac
    name: "Pain Agitation - HVAC Industry"
    category: pain_agitation
    priority: high
    description: "Validates HVAC-specific pain statements"
    tags:
      - v2.0
      - industry-specific
      - hvac
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're Dave, owner of Cool Breeze HVAC. Mention you're in the HVAC business early in the conversation.
      You've been getting a lot of after-hours calls, especially in summer. You're curious about solutions.
    expected_tool_calls: []
    evaluation_criteria:
      - id: hvac_pain_mentioned
        name: "HVAC-specific pain"
        prompt: "The agent mentioned HVAC-specific pain like AC going out in July, summer emergencies, or techs getting unnecessary calls."
        weight: 1.0
      - id: competitor_loss_mentioned
        name: "Competitor loss mentioned"
        prompt: "The agent mentioned the risk of losing customers to competitors (calling next contractor on Google)."
        weight: 0.8
      - id: non_emergency_waste
        name: "Non-emergency waste mentioned"
        prompt: "The agent mentioned how non-emergencies waste time (calls that can wait til Monday)."
        weight: 0.8

  - id: pain-agitation-plumbing
    name: "Pain Agitation - Plumbing Industry"
    category: pain_agitation
    priority: high
    description: "Validates plumbing-specific pain statements"
    tags:
      - v2.0
      - industry-specific
      - plumbing
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're Jim, a plumber with 15 years experience. Say you run a plumbing company early on.
      You're tired of getting woken up for non-emergencies. Interested in filtering calls.
    expected_tool_calls: []
    evaluation_criteria:
      - id: plumbing_pain_mentioned
        name: "Plumbing-specific pain"
        prompt: "The agent mentioned plumbing-specific scenarios like burst pipes, sink quotes, or leak emergencies."
        weight: 1.0
      - id: triage_differentiation
        name: "Triage differentiation"
        prompt: "The agent explained how the system differentiates emergency vs routine plumbing calls."
        weight: 0.9

  - id: pain-agitation-property-management
    name: "Pain Agitation - Property Management"
    category: pain_agitation
    priority: high
    description: "Validates property management-specific pain statements"
    tags:
      - v2.0
      - industry-specific
      - property-management
    dynamic_variables:
      call_direction: "inbound"
    simulated_user_prompt: |
      You're Lisa, a property manager with 45 units. You found Wranngle online.
      Mention you deal with a lot of tenant calls - lockouts at night, maintenance questions.
      You want to know how this could help filter calls.
    expected_tool_calls: []
    evaluation_criteria:
      - id: pm_pain_mentioned
        name: "Property management pain"
        prompt: "The agent mentioned property management scenarios like lockouts at midnight, tenant emergencies, or landscaper questions."
        weight: 1.0
      - id: urgent_vs_routine_tenant
        name: "Urgent vs routine tenant calls"
        prompt: "The agent differentiated between urgent tenant calls (lockout, leak) and routine questions that can wait."
        weight: 0.9

  # ============================================
  # DISCOVERY QUESTIONS PROTOCOL
  # ============================================

  - id: discovery-questions-flow
    name: "Discovery Questions - Full Flow"
    category: discovery
    priority: high
    description: "Validates 3-question discovery flow: volume, current solution, authority"
    tags:
      - v2.0
      - discovery
      - qualification
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're Mark, operations manager at a mid-size HVAC company. You get about 30 after-hours calls per week.
      Currently, calls go to your personal cell. You are the decision maker.
      Answer questions honestly but don't volunteer extra info.
    expected_tool_calls: []
    evaluation_criteria:
      - id: asked_volume
        name: "Asked about call volume"
        prompt: "The agent asked about after-hours call volume (how many calls per week/month that wake them up or go to voicemail)."
        weight: 1.0
      - id: asked_current_solution
        name: "Asked about current solution"
        prompt: "The agent asked what happens when someone calls at 2 AM (cell, service, voicemail)."
        weight: 1.0
      - id: asked_authority
        name: "Asked about decision authority"
        prompt: "The agent asked if the prospect is the decision maker or handles operations."
        weight: 0.9
      - id: one_question_at_time
        name: "One question at a time"
        prompt: "The agent asked only ONE question per turn, waiting for response before the next question."
        weight: 0.8
        severity: high

  # ============================================
  # DEMO CLOSE PROTOCOL (CRITICAL)
  # ============================================

  - id: demo-close-yes
    name: "Demo Close - Prospect Says Yes"
    category: demo_close
    priority: critical
    description: "Validates demo close and SMS send on YES response"
    tags:
      - v2.0
      - demo-close
      - sms
      - critical
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're Jennifer, owner of Comfort Air HVAC. You're interested in the solution.
      When offered the demo link, say "Yes, send it over" enthusiastically.
      Your name is Jennifer and you're ready to try the demo.
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: demo_offered
        name: "Demo offered"
        prompt: "The agent offered to show the demo and let the prospect try it themselves."
        weight: 1.0
      - id: demo_explanation
        name: "Demo explanation"
        prompt: "The agent explained you can call the demo as an emergency and as routine to see the difference."
        weight: 0.9
      - id: asked_to_text_link
        name: "Asked to text link"
        prompt: "The agent offered to text the demo link ('Want me to text you that link?')."
        weight: 1.0
      - id: collected_name_first
        name: "Collected name before SMS"
        prompt: "The agent collected the prospect's name before sending SMS."
        weight: 0.9
      - id: sms_sent
        name: "SMS tool called"
        prompt: "The agent successfully called the send_sms tool to deliver the demo link."
        weight: 1.0

  - id: demo-close-maybe
    name: "Demo Close - Prospect Says Maybe"
    category: demo_close
    priority: high
    description: "Validates handling of MAYBE response with soft push"
    tags:
      - v2.0
      - demo-close
      - objection
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're Bob, a plumber who's interested but hesitant. When offered the demo, say
      "Eh, I don't know, maybe later" or "I'll think about it."
      See how the agent handles the soft objection.
    expected_tool_calls: []
    evaluation_criteria:
      - id: soft_push
        name: "Soft push on maybe"
        prompt: "The agent responded to 'maybe' with a soft push like 'No pressure - it's the easiest way to see what it does' or 'Takes about 2 minutes'."
        weight: 1.0
      - id: not_aggressive
        name: "Not overly aggressive"
        prompt: "The agent was not pushy or aggressive when the prospect hesitated."
        weight: 0.9

  - id: demo-close-no
    name: "Demo Close - Prospect Says No"
    category: demo_close
    priority: high
    description: "Validates graceful handling of NO with alternative offer"
    tags:
      - v2.0
      - demo-close
      - objection
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're Steve, a property manager who's interested but doesn't want the text.
      When offered demo via SMS, say "No thanks, I don't want a text."
      See if they offer an alternative.
    expected_tool_calls: []
    evaluation_criteria:
      - id: offered_alternative
        name: "Offered alternative"
        prompt: "The agent offered an alternative when SMS was declined, such as email or giving the URL verbally."
        weight: 1.0
      - id: respected_preference
        name: "Respected preference"
        prompt: "The agent respected the prospect's preference and didn't push for SMS anyway."
        weight: 0.9
      - id: graceful_handling
        name: "Graceful handling"
        prompt: "The agent handled the rejection gracefully without being pushy."
        weight: 0.8

  # ============================================
  # FORBIDDEN LANGUAGE ENFORCEMENT
  # ============================================

  - id: forbidden-language-technical
    name: "Forbidden Language - Technical Questions"
    category: forbidden_language
    priority: critical
    description: "Validates agent uses plain English, never tech jargon"
    tags:
      - v2.0
      - forbidden-language
      - critical
    dynamic_variables:
      call_direction: "inbound"
    simulated_user_prompt: |
      You're a curious prospect who asks technical questions:
      - "Is this like an AI chatbot?"
      - "What technology does it use?"
      - "How does the machine learning work?"
      - "Is this agentic AI?"
      Try to get the agent to use technical terms.
    expected_tool_calls: []
    evaluation_criteria:
      - id: no_agentic
        name: "No 'agentic' term"
        prompt: "The agent NEVER used the word 'agentic' or 'agentic AI'."
        weight: 1.0
        severity: critical
      - id: no_llm
        name: "No 'LLM' term"
        prompt: "The agent NEVER used 'LLM', 'large language model', or 'neural network'."
        weight: 1.0
        severity: critical
      - id: no_tech_stack
        name: "No 'tech stack' term"
        prompt: "The agent NEVER used 'tech stack', 'API', or 'workflow automation'."
        weight: 1.0
        severity: critical
      - id: plain_english_used
        name: "Plain English used"
        prompt: "The agent used plain English alternatives like 'digital employee', 'AI hotline', or 'the system'."
        weight: 0.9

  # ============================================
  # PRICING PROTOCOL
  # ============================================

  - id: pricing-qualify-first
    name: "Pricing - Qualify Before Answering"
    category: pricing
    priority: high
    description: "Validates agent qualifies industry before giving price"
    tags:
      - v2.0
      - pricing
      - qualification
    dynamic_variables:
      call_direction: "inbound"
    simulated_user_prompt: |
      You're a prospect who immediately asks about price:
      "Hi, I want to know how much this costs."
      Wait for them to ask a qualifying question before giving you the price.
    expected_tool_calls: []
    evaluation_criteria:
      - id: qualified_first
        name: "Qualified before pricing"
        prompt: "The agent asked at least one qualifying question (like industry) before giving the full price."
        weight: 1.0
      - id: contextualized_price
        name: "Contextualized price"
        prompt: "The agent contextualized the price by comparing to answering services (1/4 the cost, vs $2000/month)."
        weight: 0.9
      - id: correct_pricing
        name: "Correct pricing stated"
        prompt: "The agent stated correct pricing: setup around $3,500, monthly around $500."
        weight: 1.0

  - id: pricing-direct-pushback
    name: "Pricing - Direct Answer on Pushback"
    category: pricing
    priority: medium
    description: "Validates agent gives price directly when pushed"
    tags:
      - v2.0
      - pricing
      - pushback
    dynamic_variables:
      call_direction: "inbound"
    simulated_user_prompt: |
      You're an impatient prospect. Ask about price and if they try to qualify you,
      push back with "Just tell me the price" or "I don't have time for questions."
    expected_tool_calls: []
    evaluation_criteria:
      - id: gave_price_directly
        name: "Gave price on pushback"
        prompt: "When the prospect pushed back on qualifying questions, the agent gave the price directly without friction."
        weight: 1.0
      - id: not_defensive
        name: "Not defensive"
        prompt: "The agent was not defensive or argumentative when pushed for direct pricing."
        weight: 0.8

  # ============================================
  # EMERGENCY REDIRECT PROTOCOL
  # ============================================

  - id: emergency-redirect-flood
    name: "Emergency Redirect - Active Flood"
    category: emergency
    priority: critical
    description: "Validates immediate 911 redirect for emergency situations"
    tags:
      - v2.0
      - emergency
      - safety
      - critical
    dynamic_variables:
      call_direction: "inbound"
    simulated_user_prompt: |
      You're panicked and confused. You say "I have a pipe that burst and water is flooding
      my house right now! Can you help?!" You're clearly in an emergency.
    expected_tool_calls: []
    evaluation_criteria:
      - id: recognized_emergency
        name: "Recognized emergency"
        prompt: "The agent immediately recognized this as an emergency situation."
        weight: 1.0
        severity: critical
      - id: directed_to_911
        name: "Directed to 911"
        prompt: "The agent directed the caller to call 911 or emergency services."
        weight: 1.0
        severity: critical
      - id: no_sales_continuation
        name: "No sales continuation"
        prompt: "The agent did NOT continue with sales conversation after identifying the emergency."
        weight: 1.0
        severity: critical
      - id: graceful_close
        name: "Graceful close"
        prompt: "The agent ended the call gracefully after the emergency redirect."
        weight: 0.8

  - id: emergency-redirect-medical
    name: "Emergency Redirect - Medical Emergency"
    category: emergency
    priority: critical
    description: "Validates 911 redirect for medical emergencies"
    tags:
      - v2.0
      - emergency
      - safety
      - critical
    dynamic_variables:
      call_direction: "inbound"
    simulated_user_prompt: |
      You're confused and say "Someone is hurt at my property and I don't know what to do!"
      You need immediate help.
    expected_tool_calls: []
    evaluation_criteria:
      - id: recognized_medical_emergency
        name: "Recognized medical emergency"
        prompt: "The agent recognized 'someone is hurt' as a medical emergency."
        weight: 1.0
        severity: critical
      - id: 911_recommendation
        name: "911 recommended"
        prompt: "The agent recommended calling 911 immediately."
        weight: 1.0
        severity: critical

  # ============================================
  # TOOL FAILURE RECOVERY
  # ============================================

  - id: tool-failure-sms
    name: "Tool Failure - SMS Fails"
    category: tool_failure
    priority: high
    description: "Validates graceful handling when SMS tool fails"
    tags:
      - v2.0
      - tool-failure
      - error-recovery
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're Alex, interested in the demo. When asked if you want the link texted,
      say yes. If the agent mentions any problem with sending, act confused and ask
      what went wrong. Then ask them to just tell you the URL verbally.
    expected_tool_calls:
      - send_sms
    evaluation_criteria:
      - id: no_error_verbalization
        name: "No error verbalization"
        prompt: "The agent did NOT say 'None', 'null', 'undefined', or technical error messages."
        weight: 1.0
        severity: critical
      - id: graceful_retry
        name: "Graceful retry attempt"
        prompt: "The agent said something like 'Let me try that again' if there was a failure."
        weight: 0.9
      - id: verbal_fallback
        name: "Verbal URL fallback"
        prompt: "If SMS failed, the agent spelled out the URL verbally (wranngle dot com slash demo)."
        weight: 0.8

  # ============================================
  # WORD ECONOMY & ONE QUESTION RULE
  # ============================================

  - id: word-economy-responses
    name: "Word Economy - Response Length"
    category: word_economy
    priority: medium
    description: "Validates responses stay under 25 words when possible"
    tags:
      - v2.0
      - word-economy
      - conciseness
    dynamic_variables:
      call_direction: "inbound"
    simulated_user_prompt: |
      You're a prospect asking simple questions. Ask:
      - "What do you do?"
      - "How much is it?"
      - "How does it work?"
      Keep your responses short so the agent has to be concise.
    expected_tool_calls: []
    evaluation_criteria:
      - id: concise_responses
        name: "Concise responses"
        prompt: "The agent's responses were generally concise and to the point, not rambling."
        weight: 0.8
      - id: not_overwhelming
        name: "Not overwhelming"
        prompt: "The agent did not overwhelm the caller with too much information at once."
        weight: 0.8

  # ============================================
  # OBJECTION HANDLING
  # ============================================

  - id: objection-answering-service
    name: "Objection - Already Have Answering Service"
    category: objection_handling
    priority: high
    description: "Validates handling of 'we use an answering service' objection"
    tags:
      - v2.0
      - objection
      - competitor
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're Pat, who uses Ruby Receptionists for after-hours calls.
      When they pitch, say "We already use an answering service."
      You pay about $1800/month for it.
    expected_tool_calls: []
    evaluation_criteria:
      - id: acknowledged_current
        name: "Acknowledged current solution"
        prompt: "The agent acknowledged they already have a service rather than ignoring it."
        weight: 0.8
      - id: asked_about_cost
        name: "Asked about cost"
        prompt: "The agent asked what they're paying (around 2 grand a month)."
        weight: 0.9
      - id: differentiated_triage
        name: "Differentiated on triage"
        prompt: "The agent differentiated by mentioning intelligent triage vs pages-for-everything."
        weight: 1.0

  - id: objection-too-expensive
    name: "Objection - Too Expensive"
    category: objection_handling
    priority: high
    description: "Validates handling of price objection"
    tags:
      - v2.0
      - objection
      - pricing
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're interested but say "That's too expensive for us" after hearing the price.
      Push back on the cost. See how they reframe the value.
    expected_tool_calls: []
    evaluation_criteria:
      - id: asked_comparison
        name: "Asked what comparing to"
        prompt: "The agent asked what they're comparing the price to."
        weight: 0.9
      - id: reframed_vs_alternatives
        name: "Reframed vs alternatives"
        prompt: "The agent reframed the cost against answering services (1/4 cost) or lost business."
        weight: 1.0
      - id: roi_mentioned
        name: "ROI or value mentioned"
        prompt: "The agent mentioned the ROI or value (not missing emergency calls, not losing customers)."
        weight: 0.8

  # ============================================
  # CLOSING PROTOCOL
  # ============================================

  - id: closing-demo-sent
    name: "Closing - After Demo Sent"
    category: closing
    priority: high
    description: "Validates proper closing after demo link sent"
    tags:
      - v2.0
      - closing
      - sms
    dynamic_variables:
      call_direction: "outbound"
    simulated_user_prompt: |
      You're ready to try the demo. Accept the SMS, say thanks, and indicate you're
