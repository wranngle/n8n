name: workflow-matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_docker:
        description: 'Set 1 to run the docker-backed e2e leg (default: shape check only)'
        required: false
        default: '0'

permissions:
  contents: read

concurrency:
  group: workflow-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      workflows: ${{ steps.list.outputs.workflows }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - id: list
        name: list workflows/*.json
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=( workflows/*.json )
          json='['
          first=1
          for f in "${files[@]}"; do
            [[ $first -eq 1 ]] || json+=','
            json+="\"$f\""
            first=0
          done
          json+=']'
          echo "workflows=$json" >>"$GITHUB_OUTPUT"
          echo "count=${#files[@]}" >>"$GITHUB_OUTPUT"
          echo "discovered ${#files[@]} workflow(s): ${files[*]:-(none)}"

  matrix-test:
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workflow: ${{ fromJSON(needs.discover.outputs.workflows) }}
    name: ${{ matrix.workflow }}
    env:
      RUN_DOCKER: ${{ github.event.inputs.run_docker || '0' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: run ci-matrix-runner
        shell: bash
        run: scripts/ci-matrix-runner.sh "${{ matrix.workflow }}"
