# Voice Agent Automated Tests
# Triggers ElevenLabs Conversation Simulation via n8n webhook
#
# Setup Requirements:
# 1. Add repository secret: N8N_WEBHOOK_SECRET (optional, for signed requests)
# 2. Ensure n8n workflow Xlr1brwbzNPMyTbW is active
# 3. Configure alert webhook in test-scenarios.yaml

name: Voice Agent Tests

on:
  # Manual trigger with inputs
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to test (sarah-wranngle, sewy-garage, or all)'
        required: true
        default: 'sarah-wranngle'
        type: choice
        options:
          - sarah-wranngle
          - sewy-garage
          - all
      priority:
        description: 'Test priority filter'
        required: true
        default: 'critical'
        type: choice
        options:
          - critical
          - high
          - medium
          - all
      category:
        description: 'Test category filter'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - happy_path
          - edge_case
          - stress_test
          - tool_validation
          - error_handling

  # Schedule: Daily at 6 AM UTC (critical tests only)
  schedule:
    - cron: '0 6 * * *'

  # Trigger on PR to main (for agent prompt changes)
  pull_request:
    branches: [main]
    paths:
      - 'workflows/voice_ai_agents/**/*.yaml'
      - 'context/elevenlabs-agents/**/*.md'

  # Trigger on push to main (post-merge validation)
  push:
    branches: [main]
    paths:
      - 'workflows/voice_ai_agents/**/*.yaml'
      - 'context/elevenlabs-agents/**/*.md'

env:
  N8N_WEBHOOK_URL: https://n8n.wranngle.com/webhook/voice-agent-test
  WORKFLOW_ID: Xlr1brwbzNPMyTbW

jobs:
  test-voice-agents:
    name: Run Voice Agent Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine test parameters
        id: params
        run: |
          # Default values for scheduled/push/PR triggers
          AGENT="${{ github.event.inputs.agent || 'sarah-wranngle' }}"
          PRIORITY="${{ github.event.inputs.priority || 'critical' }}"
          CATEGORY="${{ github.event.inputs.category || 'all' }}"

          # For scheduled runs, always test critical priority
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            PRIORITY="critical"
            AGENT="sarah-wranngle"
          fi

          # For PRs, test critical and high priority
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PRIORITY="high"
          fi

          echo "agent=$AGENT" >> $GITHUB_OUTPUT
          echo "priority=$PRIORITY" >> $GITHUB_OUTPUT
          echo "category=$CATEGORY" >> $GITHUB_OUTPUT

          echo "Testing agent: $AGENT"
          echo "Priority filter: $PRIORITY"
          echo "Category filter: $CATEGORY"

      - name: Trigger Voice Agent Tests
        id: trigger
        run: |
          # Build request payload
          PAYLOAD=$(cat <<EOF
          {
            "trigger": "github-actions",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "event": "${{ github.event_name }}",
            "filters": {
              "agent": "${{ steps.params.outputs.agent }}",
              "priority": "${{ steps.params.outputs.priority }}",
              "category": "${{ steps.params.outputs.category }}"
            }
          }
          EOF
          )

          echo "Triggering n8n workflow..."
          echo "Payload: $PAYLOAD"

          # Make request to n8n webhook
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: ${{ github.event_name }}" \
            -H "X-GitHub-Run-ID: ${{ github.run_id }}" \
            -d "$PAYLOAD")

          # Extract response body and status code
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "response=$BODY" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "::error::Failed to trigger tests. HTTP $HTTP_CODE: $BODY"
            exit 1
          fi

      - name: Parse Test Results
        id: results
        if: steps.trigger.outputs.status == 'success'
        run: |
          RESPONSE='${{ steps.trigger.outputs.response }}'

          # Parse JSON response (using jq if available, fallback to grep)
          if command -v jq &> /dev/null; then
            SUCCESS_RATE=$(echo "$RESPONSE" | jq -r '.metrics.success_rate // "N/A"')
            TOOL_ACCURACY=$(echo "$RESPONSE" | jq -r '.metrics.tool_accuracy // "N/A"')
            TOTAL_TESTS=$(echo "$RESPONSE" | jq -r '.metrics.total_tests // 0')
            PASSED=$(echo "$RESPONSE" | jq -r '.metrics.passed // 0')
            FAILED=$(echo "$RESPONSE" | jq -r '.metrics.failed // 0')
            CRITICAL_FAILURES=$(echo "$RESPONSE" | jq -r '.metrics.critical_failures // 0')
          else
            SUCCESS_RATE="See workflow output"
            TOTAL_TESTS="See workflow output"
          fi

          echo "## Voice Agent Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Agent | ${{ steps.params.outputs.agent }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Success Rate | $SUCCESS_RATE |" >> $GITHUB_STEP_SUMMARY
          echo "| Tool Accuracy | $TOOL_ACCURACY |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL_TESTS |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Failures | $CRITICAL_FAILURES |" >> $GITHUB_STEP_SUMMARY

          # Store for quality gate check
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "critical_failures=$CRITICAL_FAILURES" >> $GITHUB_OUTPUT

      - name: Quality Gate Check
        if: steps.trigger.outputs.status == 'success'
        run: |
          CRITICAL_FAILURES="${{ steps.results.outputs.critical_failures }}"
          SUCCESS_RATE="${{ steps.results.outputs.success_rate }}"

          # Fail if any critical tests failed
          if [[ "$CRITICAL_FAILURES" != "0" && "$CRITICAL_FAILURES" != "N/A" ]]; then
            echo "::error::Quality gate failed: $CRITICAL_FAILURES critical test(s) failed"
            exit 1
          fi

          # Fail if success rate is below 80%
          if [[ "$SUCCESS_RATE" != "N/A" ]]; then
            RATE_NUM=$(echo "$SUCCESS_RATE" | tr -d '%')
            if (( $(echo "$RATE_NUM < 80" | bc -l 2>/dev/null || echo 0) )); then
              echo "::error::Quality gate failed: Success rate $SUCCESS_RATE is below 80%"
              exit 1
            fi
          fi

          echo "Quality gates passed!"

  # Separate job for promotion testing
  promotion-gate:
    name: Promotion Gate Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && contains(github.event.inputs.agent, 'promotion')
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Promotion Gate Tests
        run: |
          echo "Running comprehensive promotion gate tests..."

          # Trigger n8n with promotion gate configuration
          PAYLOAD=$(cat <<EOF
          {
            "trigger": "promotion-gate",
            "agent": "${{ github.event.inputs.agent }}",
            "filters": {
              "priority": ["critical", "high"],
              "category": ["happy_path", "tool_validation"]
            },
            "required_pass_rate": 95,
            "required_tool_accuracy": 100
          }
          EOF
          )

          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Verify Promotion Criteria
        run: |
          echo "Verifying promotion criteria..."
          # This would check the response for pass/fail
          # Implementation depends on n8n response format
