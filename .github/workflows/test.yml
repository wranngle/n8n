name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies (bun)
        run: bun install
      - name: Hook utils smoke test
        run: bun run verify
      - name: Python syntax check (py_compile all scripts)
        run: python -m compileall -q scripts
      - name: Lint JS scripts (node --check)
        run: |
          for f in scripts/*.js scripts/lib/*.js; do
            [ -f "$f" ] && node --check "$f"
          done
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
