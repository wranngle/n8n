name: Voice AI Agents - Automated Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'workflows/voice_ai_agents/**'
      - 'workflows/dev/**'
      - '.github/workflows/voice-ai-vitest.yml'
  pull_request:
    branches: [main]
    paths:
      - 'workflows/voice_ai_agents/**'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  N8N_API_URL: ${{ secrets.N8N_API_URL }}
  N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
  ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}

jobs:
  unit-tests:
    name: Unit Tests (offline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows/voice_ai_agents

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Convention: offline projects are defined in vitest.config.ts
      # No hardcoded exclude lists — add a new project and tag it offline/live
      - name: Run offline tests
        run: |
          bunx vitest run --project ingestion --project integration --project governance --reporter=json --outputFile=test-results.json 2>&1 | tee test-output.txt
          bunx vitest run --project ingestion --project integration --project governance

      - name: Publish test summary
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          try {
            const r = JSON.parse(fs.readFileSync('test-results.json','utf8'));
            const passed = r.numPassedTests;
            const failed = r.numFailedTests;
            const total = r.numTotalTests;
            const suites = r.numPassedTestSuites;
            const totalSuites = r.numTotalTestSuites;
            const dur = ((r.testResults||[]).reduce((a,t)=>a+(t.endTime-t.startTime),0)/1000).toFixed(1);
            const icon = failed > 0 ? '🔴' : '🟢';
            let md = '# ' + icon + ' Test Results (Offline)\n\n';
            md += '| Metric | Value |\n|---|---|\n';
            md += '| Tests | **' + passed + '** passed, **' + failed + '** failed, **' + total + '** total |\n';
            md += '| Suites | **' + suites + '/' + totalSuites + '** passed |\n';
            md += '| Duration | ' + dur + 's |\n\n';
            if (failed > 0) {
              md += '## Failed Tests\n\n';
              for (const suite of (r.testResults||[])) {
                for (const t of (suite.assertionResults||[])) {
                  if (t.status === 'failed') {
                    md += '- **' + t.ancestorTitles.join(' > ') + ' > ' + t.title + '**\n';
                    md += '  \`\`\`\n  ' + (t.failureMessages||[]).join('\n  ').slice(0,500) + '\n  \`\`\`\n';
                  }
                }
              }
            }
            md += '\n## Suites\n\n';
            for (const suite of (r.testResults||[])) {
              const ar = suite.assertionResults||[];
              const sp = ar.filter(t=>t.status==='passed').length;
              const sf = ar.filter(t=>t.status==='failed').length;
              const si = sf > 0 ? 'FAIL' : 'PASS';
              const name = suite.name.split('/').pop();
              md += si + ' **' + name + '** — ' + sp + ' passed';
              if (sf > 0) md += ', ' + sf + ' failed';
              md += '\n';
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          } catch(e) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '# Test Results\n\nFailed to parse test-results.json: ' + e.message + '\n');
          }
          "

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: workflows/voice_ai_agents/allure-results/

  live-tests:
    name: Live Tests (network)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: workflows/voice_ai_agents

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify secrets exist
        run: |
          MISSING=""
          if [ -z "$N8N_API_URL" ]; then MISSING="$MISSING N8N_API_URL"; fi
          if [ -z "$N8N_API_KEY" ]; then MISSING="$MISSING N8N_API_KEY"; fi
          if [ -z "$ELEVENLABS_API_KEY" ]; then MISSING="$MISSING ELEVENLABS_API_KEY"; fi
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing secrets:$MISSING — some live tests may fail"
          fi

      # Convention: live projects are defined in vitest.config.ts
      - name: Run live tests
        run: bunx vitest run --project webhook --project elevenlabs --project n8n-eval --project mcp
        continue-on-error: true

      - name: Run legacy integration runners
        run: |
          bun run scripts/test-elevenlabs-runner.ts || true
          bun run scripts/test-n8n-eval-runner.ts || true
          bun run scripts/test-mcp-runner.ts || true

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, live-tests]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "Tests failed - notification would be sent here"
          # Future: Send to Slack, email, or n8n webhook
