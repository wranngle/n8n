name: Bug
description: Existing behavior is wrong
title: "bug: "
labels: [bug, triage]
body:
  - type: textarea
    id: what
    attributes:
      label: What & how to reproduce
      description: Symptom in 1-2 lines, then exact steps. Include error messages verbatim.
      placeholder: |
        Symptom: ...
        Reproduce:
        1. ...
        2. ...
        3. ...
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Drives the a/<area> label automatically via the issue-triage workflow.
      options:
        - workflows
        - conversion
        - verification
        - docs
        - ci
        - security
        - other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Versions, OS, runtime. Paste `node -v && npm -v && uname -a` or equivalent.
      render: shell
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
