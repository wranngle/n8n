name: Feature
description: Something new
title: "feat: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem & Why now
      description: What problem does this solve, and why now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Sketch the API / UX. Code snippets welcome. If you don't know yet, file a research issue instead.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - workflows
        - conversion
        - verification
        - docs
        - ci
        - security
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why not those?
